server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**

jwt:
  secret: AlphaPowerJwtSecretKey2026AlphaPowerJwtSecretKey2026
  expiration: 3600000